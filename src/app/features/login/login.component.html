<div class="login-container">

  <h2>Login</h2>

  <div>
    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="username">
  </div>

  <div>
    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password">
  </div>

  <button (click)="login()">
    Entrar
  </button>

  <p style="color:red">
    {{ errorMessage }}
  </p>

</div>
