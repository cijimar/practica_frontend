<div class="login-container">

  <h1>Login</h1>

  <div class="form-group">

    <label>User</label>

    <input
      type="text"
      [(ngModel)]="username">

  </div>

  <div class="form-group">

    <label>Password</label>

    <input
      type="password"
      [(ngModel)]="password">

  </div>

  <button (click)="login()">
    Login
  </button>

  <p class="error-message">
    {{ errorMessage }}
  </p>

</div>
